<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Comunicando - Traductor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Comunicando - MVP</h1>

  <div class="container">
    <h2>Traductor de Señas a Texto</h2>
    <input type="file" id="imageInput" accept="image/*" placeholder="envíe una imagen">
    <div class="image-preview">
        <h3>Vista Previa de la Seña:</h3>
        <img id="previewImage" src="" alt="Vista Previa de la Seña" style="max-width: 100%; display: none;">
    </div>
    <button id="btnTranslate">Traducir</button>
    <div id="output">
        <p>Aquí aparecerá el texto traducido.</p>
    </div>

  </div>

  <script src="../js/index.js"></script>
</body>
</html>
